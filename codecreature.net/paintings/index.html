		<main id="content">
		
			<div class="full-width"><div class="card">
				<div class="title">Painting Diary</div>
				I recently started painting for the first time since I was a kid.
				<br>Thought I would track my progress here as a way to stay motivated!
				<br>Currently aiming to do a session weekly.
			</div></div>
			
			<figure class="card">
				<div class="date">2026/05/12</div>
				<figcaption class="title">What I Had On My Counter</figcaption>
				<img src="2026_05_12.jpg" alt="Realistic painting of kitchen items on a crumpled white fabric backdrop. Hints of red underpaint show through.">
				<div class="materials">Acrylic on canvas board</div>
				<div class="time">3 hours</div>
				<div class="comments"><div>
					Green bananas, sprouted onion, very old lemon, mostly empty mug of water. Normal stuff.
					<br>I thought still life would be easier than portraits but it <em>really</em> wasn't. Went a full hour overtime. I really like how the mug looks though!
				</div></div>
			</figure>
			
			<figure class="card">
				<div class="date">2026/05/04</div>
				<figcaption class="title">Portrait of Mother Painting Portrait of Me II</figcaption>
				<img src="2026_05_04.jpg" alt="Bust portrait of a middle-aged white woman with blue eyes and graying brown hair in a loose ponytail. The colors are warm and unrealistically vibrant. She is wearing a gray crewneck t-shirt and looking to the left with a serious expression. The background is solid, bright red.">
				<div class="materials">Acrylic on canvas board</div>
				<div class="time">2 hours</div>
				<div class="comments"><div>
					Same subject, but was more careful with the sketch! Much better likeness and proportions. Enjoyed working over the bright red wash, and doing the t-shirt fabric.
				</div></div>
			</figure>
			
			<figure class="card">
				<div class="date">2026/04/25</div>
				<figcaption class="title">Portrait of Mother Painting Portrait of Me</figcaption>
				<img src="2026_04_25.jpg" alt="Loose three-quarters bust portrait of a middle-aged white woman with blue eyes and graying brown hair in a high ponytail. She is wearing a dark turtleneck sweater and looking at the viewer with a slightly parted mouth. The background is a swirled blue.">
				<div class="materials">Acrylic on canvas board</div>
				<div class="time">1.5 hours</div>
				<div class="comments"><div>
					Went to a library event where you and someone else try to paint each other! Had a lot of fun, but wasn't satisfied with the proportions (the nose especially) or the placement of the figure on the canvas.
				</div></div>
			</figure>
