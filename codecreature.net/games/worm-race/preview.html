<!DOCTYPE html>
<html lang="en">
	<head>
		<script>
			// if the link was to the neocities page, redirect to codecreature.net
			if ( window.location.hostname.includes('codecreature.neocities.org') ) {
				window.location.hostname = window.location.hostname.replace('codecreature.neocities.org','codecreature.net');
			} else {
				history.replaceState({}, "", "/games/worm-race");
				location.reload();
			}
		</script>
		<meta charset="utf-8">
	</head>
</html>
<body>
	<p>
		This is a filler HTML page so that updates are visible on Neocities!
		<br>If you aren't redirected automatically, <a href="/games/worm-race">click here</a>.
	</p>
	<p>Last update: 2026/04/09</p>
</body>
