<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
		<title>silly trinkets</title>
		<!-- favicon -->
		<link rel="icon" type="image/x-icon" href="../favicon.ico">
		<link rel="icon" type="image/png" sizes="16x16" href="../favicon16.png">
		<link rel="icon" type="image/png" sizes="32x32" href="../favicon32.png">
		<link rel="icon" type="image/png" sizes="48x48" href="../favicon48.png">
		<link rel="apple-touch-icon" sizes="180x180" href="../favicon_apple_touch.png">
		
		<!-- universal base javascript -->
		<script src="/codefiles/required.js?fileversion=20260410"></script>
		<!-- universal base css -->
		<link href="/codefiles/required.css?fileversion=20260410" rel="stylesheet" type="text/css"></link>
		
		<script>fonts.load('');</script>
		
		<!-- page settings -->
		<script src="/codefiles/page-settings.min.js?fileversion=20260410"></script>
		
		<!--this page's stylesheets-->
		<link href="../trinkets-default.css?fileversion=20260410" rel="stylesheet" type="text/css" media="all">
		<link href="style.css?fileversion=20260410" rel="stylesheet" type="text/css" media="all">
		<!-- this page's scripts -->
		<script src="../loading.js?fileversion=20260410"></script>
	</head>
	
	<!-----------BODY------------------->
	<body>
		<div class="effect-layers el-1"></div> <div class="effect-layers el-2"></div> <div class="effect-layers el-3"></div>
		
		<base target="_blank"><!-- open links in new tab unless otherwise specified -->
		
		<nav>
			<p class="sr-only">Sorry, this page is not screen reader friendly!</p>
			<a href="/" target="_self" class="navbutton home glow-focus">
				<img src="images/house_charm.png">
				<div class="paper-popout"><span>Home</span></div>
			</a>
			<div id="page-settings" class="page-settings">
				<button id="page-settings-button" class="navbutton open-page-settings glow-focus" aria-label="page settings">
					<img src="images/gear.png" alt="settings">
					<div class="paper-popout left"><span>Settings</span></div>
				</button>
			</div>
		</nav>
			
		<div id="load-screen"><div class="wrapper">
			<img src="images/waiting_room.png" alt="">
			<br>Loading...
		</div></div>
		
		<main><div id="drag-wrapper" class="hidden"> <!-- hidden until images load -->
			<img id="top-left-marker" class="corner" src="images/corner.png" alt="">
			<img id="top-right-marker" class="corner" src="images/corner.png" alt="">
			<img id="bottom-left-marker" class="corner" src="images/corner.png" alt="">
			<img id="bottom-right-marker" class="corner" src="images/corner.png" alt="">
			
			<!--section to move around when I need to make more space -->
			<div class="repositioner">
				
				<div id="intro">
					<img src="images/envelope.png" alt="" style="left: -269px; top: -147px; scale: .800;">
					<p style="left: 21px; top: 16px;">Click and drag to explore...</p>
				</div>
				
				<button id="credit-button" popovertarget="credits" class="glow-focus link">
					<img src="images/x.png" style="image-rendering: pixelated;">
					<div class="paper-popout"><span>Credits</span></div>
				</button>
				<div popover="" id="credits"><div class="wrapper">
					<h2>Credits</h2>
					
					<h4>Transparent PNG Blogs</h4>
					These are some of my favorites for sourcing things!
					<ul>
						<li><a href="https://snailspng.tumblr.com/">snailspng</a></li>
						<li><a href="https://oldjewelryfeed.tumblr.com/">oldjewelryfeed</a></li>
						<li><a href="https://www.tumblr.com/lupineshieldmaiden">lupineshieldmaiden</a></li>
					</ul>
					
					<h4>Misc</h4>
					<ul>
						<li><a href="https://www.tumblr.com/777polaris/804345126909509632?source=share">Alphabet beads</a> from 777polaris</li>
					</ul>
					
					<br><button class="close" popovertarget="credits">Close</button>
				</div></div>
				<!-- end credits -->
				
				<div style="position: absolute; rotate: 11deg; left: 731px; top: -85px; width: 700px; height: 700px; background-image: url('/graphix/bg/perler_smiles_green.png'); background-size: 300px; mask: url('clip-paths/perler-blob.svg');"></div>
				
				<div class="water-blob parallax parallax-2" style="rotate: 11deg; left: 38px; top: 226px;"></div>
				
				<img src="images/inflatable_chair.png" alt="" style="left: 557px; top: 454px; scale: 0.8;">
				<img src="images/agate_goo.png" alt="" style="left: 465px; top: 384px; scale: 0.8;">
				<img src="images/cloud_cube.png" alt="" style="left: 2px; top: 360px; scale: 0.8;">
				<img src="images/mantis_goggles.png" alt="" style="left: 195px; top: 514px;">
				
				<img src="images/funky_stars.png" alt="" style="left: 815px; top: -73px; scale: 0.8;">
				<img src="images/sea_angel_globe.png" alt="" style="left: 649px; top: 45px; scale: 0.8;">
				
				<img src="images/citrus_kitty.png" alt="" style="left: 1096px; top: 188px;">
			</div>
		</div></main>
	</body>
	<!--------------END BODY------------->
	
	<!-- script to enable the dragging movement -->
	<script src="../trinkets-draggable.js?fileversion=20260410"></script>
</html>
