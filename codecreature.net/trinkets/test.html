<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
		<title>drag test</title>
		<!-- favicon -->
		<link rel="icon" type="image/x-icon" href="favicon.gif">
		
		<!-- universal base javascript -->
		<script src="/codefiles/required.js?fileversion=20260410"></script>
		<!-- universal base css -->
		<link href="/codefiles/required.css?fileversion=20260410" rel="stylesheet" type="text/css"></link>
		
		<!-- page settings -->
		<script src="/codefiles/page-settings.min.js?fileversion=20260410"></script>
		
		<style>
			
			
			/* section behind the window that gets dragged */
			#drag-wrapper {
				position: absolute;
				top: 0px; left: 0px;
				overflow: scroll;
				scroll-behavior: smooth;
				user-select: none;
				background: yellow;
				font-size: 600px;
				width: 700px;
				height: 700px;
			}
			/* Hide scrollbar for Chrome, Safari and Opera */
			body:not(.defaultScrollbars) #drag-wrapper::-webkit-scrollbar {
				display: none;
			}
			/* Hide scrollbar for IE, Edge and Firefox */
			body:not(.defaultScrollbars) #drag-wrapper {
				-ms-overflow-style: none;  /* IE and Edge */
				scrollbar-width: none;  /* Firefox */
			}
		</style>
	</head>
	
	<!-----------BODY------------------->
<body>
	<div id="drag-wrapper">
		lineOne
		<br>lineTwo
		<br>lineThree
	</div>
	<!-- script to enable the dragging movement -->
	<script src="trinkets-draggable.js?fileversion=20260410"></script>
</body>
	<!--------------END BODY------------->
	
</html>
